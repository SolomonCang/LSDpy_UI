<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LSD UI - Task</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="header-inner">
        <div class="brand">LSD UI Workbench</div>
        <nav class="main-nav">
          <a class="nav-link" data-page="params" href="params.html">Parameters</a>
          <a class="nav-link" data-page="data" href="data.html">Spectrum & Mask</a>
          <a class="nav-link active" data-page="task" href="task.html">LSD Task</a>
          <a class="nav-link" data-page="results" href="results.html">Result Plot</a>
        </nav>
      </div>
    </header>

    <main class="page">
      <section class="hero">
        <h1>LSD Task</h1>
        <p>Run LSD on the observations configured in the Spectrum &amp; Mask page.</p>
      </section>

      <section class="card">
        <h2>Run Control</h2>
        <div class="btn-row">
          <button class="btn btn-secondary" id="btn-run-validate">Validate Config</button>
          <button class="btn btn-primary" id="btn-run-start">▶ Run LSD</button>
          <button class="btn btn-danger" id="btn-run-stop">■ Stop</button>
          <span id="task-status" class="status">Idle</span>
        </div>
      </section>

      <section class="card">
        <h2>Task Log</h2>
        <div class="btn-row" style="margin-bottom:6px">
          <button class="btn ghost btn-sm" id="btn-log-clear">Clear Log</button>
          <span id="batch-info" style="font-size:12px;color:var(--text-muted)"></span>
        </div>
        <div id="task-log" class="log"></div>
      </section>
    </main>

    <script src="js/common.js"></script>
    <script src="js/task.js"></script>
  </body>
</html>
