<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LSD UI - Parameters</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="header-inner">
        <div class="brand">LSD UI Workbench</div>
        <nav class="main-nav">
          <a class="nav-link active" data-page="params" href="params.html">Parameters</a>
          <a class="nav-link" data-page="data" href="data.html">Spectrum &amp; Mask</a>
          <a class="nav-link" data-page="task" href="task.html">LSD Task</a>
          <a class="nav-link" data-page="results" href="results.html">Result Plot</a>
        </nav>
      </div>
    </header>

    <main class="page">
      <section class="hero">
        <h1>Parameters</h1>
        <p>Control profile, normalization, processing, and output behavior.</p>
      </section>

      <!-- Actions bar -->
      <section class="card" style="margin-bottom:16px">
        <div class="btn-row">
          <button class="btn btn-secondary" id="params-reload-btn">↻ Reload</button>
          <button class="btn btn-secondary" id="params-reset-btn">⟳ Reset</button>
          <button class="btn btn-secondary" id="params-export-btn">⬇ Export JSON</button>
          <button class="btn btn-primary"   id="params-save-btn">💾 Save</button>
          <span id="params-status" class="status-bar" aria-live="polite" style="display:inline-block;min-height:1.4em;min-width:120px">&nbsp;</span>
        </div>
      </section>

      <!-- Accordion sections rendered by params.js -->
      <div id="params-form" class="accordion-list"></div>

      <!-- JSON preview -->
      <section class="card" style="margin-top:16px">
        <details>
          <summary style="cursor:pointer;font-weight:600;padding:4px 0">JSON Preview</summary>
          <textarea id="params-json-preview" class="json-preview" spellcheck="false" readonly style="margin-top:8px"></textarea>
        </details>
      </section>
    </main>

    <script src="js/common.js"></script>
    <script src="js/params.js"></script>
  </body>
</html>
